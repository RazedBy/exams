networks:
  indusflow_net:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  airflow_logs:

services:
  # --- ENTREPÔT DE DONNÉES (POSTGRESQL) ---
  postgres:
    image: postgres:${POSTGRES_VERSION}-alpine
    container_name: indusflow_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./dags/init_schema.sql:/docker-entrypoint-initdb.d/init_schema.sql
    networks:
      - indusflow_net
    restart: always

  # --- STOCKAGE BRUT / STAGING (MINIO) ---
  minio:
    image: minio/minio:latest
    container_name: indusflow_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - indusflow_net
    restart: always

  # --- CALCUL DISTRIBUÉ (SPARK MASTER) ---
  spark-master:
    image: apache/spark:3.5.1
    container_name: indusflow_spark_master
    environment:
      - SPARK_MODE=master
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "8081:8080"
      - "7077:7077"
    volumes:
      - ./dags:/opt/spark/dags
    networks:
      - indusflow_net
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    restart: always

  spark-worker:
    image: apache/spark:3.5.1
    container_name: indusflow_spark_worker
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./dags:/opt/spark/dags
    depends_on:
      - spark-master
    networks:
      - indusflow_net
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    restart: always

  # --- ORCHESTRATION (APACHE AIRFLOW) ---
  airflow-webserver:
    image: apache/airflow:${AIRFLOW_VERSION}
    container_name: indusflow_airflow_webserver
    environment:
      - LOAD_EXHAUSTIVE_EXAMPLES=False
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - AIRFLOW_CONN_POSTGRES_DEFAULT=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - AIRFLOW_ADMIN_USER=${AIRFLOW_ADMIN_USER}
      - AIRFLOW_ADMIN_PASSWORD=${AIRFLOW_ADMIN_PASSWORD}
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - postgres
    networks:
      - indusflow_net
    command: bash -c "airflow db migrate && airflow users create --username ${AIRFLOW_ADMIN_USER} --firstname Admin --lastname Admin --role Admin --email admin@example.com --password ${AIRFLOW_ADMIN_PASSWORD} || true && airflow webserver"
    restart: always

  # --- APACHE AIRFLOW : LE PLANIFICATEUR (SCHEDULER) ---
  airflow-scheduler:
    image: apache/airflow:${AIRFLOW_VERSION}
    container_name: indusflow_airflow_scheduler
    environment:
      - LOAD_EXHAUSTIVE_EXAMPLES=False
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - AIRFLOW_CONN_POSTGRES_DEFAULT=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - postgres
    networks:
      - indusflow_net
    command: scheduler
    restart: always

  # --- SUPERVISION & MONITORING (GRAFANA) ---
  grafana:
    image: grafana/grafana:10.4.1
    container_name: indusflow_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - postgres
    networks:
      - indusflow_net
    restart: always

  # --- PROMETHEUS (METRICS COLLECTION) ---
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: indusflow_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - indusflow_net
    restart: always

  # --- POSTGRES EXPORTER ---
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: indusflow_postgres_exporter
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    depends_on:
      - postgres
    networks:
      - indusflow_net
    restart: always

  # --- NODE EXPORTER ---
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: indusflow_node_exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($|/)'
    networks:
      - indusflow_net
    restart: always